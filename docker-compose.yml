services:

  # -------- USER DB --------
  postgres-user:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5434:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data

  # -------- USER SERVICE --------
  user-service:
    build: ./userService
    depends_on:
      - postgres-user
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  # -------- DOC DB --------
  postgres-docs:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docs_db
    ports:
      - "5433:5432"
    volumes:
      - docs-db-data:/var/lib/postgresql/data

  # -------- DOCUMENT SERVICE --------
  document-service:
    build: ./documentService
    depends_on:
      - postgres-docs
      - user-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-docs:5432/docs_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

volumes:
  user-db-data:
  docs-db-data:
